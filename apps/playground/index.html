<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        var root = document.documentElement;
        function paint() {
          var dark = mq.matches;
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";
          root.style.backgroundColor = dark ? "oklch(10% 0 0)" : "#ffffff";
        }
        paint();
        mq.addEventListener("change", paint);
      })();
    </script>
    <style>
      html {
        background: #ffffff;
        color-scheme: light;
      }
      html.dark {
        background: oklch(10% 0 0);
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: inherit;
      }
      #app {
        height: 100%;
        overflow: hidden;
        background: inherit;
      }
      iframe.preview {
        background: #ffffff;
      }
      html.dark iframe.preview {
        background: oklch(10% 0 0);
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ilha Playground</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
